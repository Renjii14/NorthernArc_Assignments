    <section class="login-page d-flex align-items-center justify-content-center p-3 p-md-4">
      <div class="login-shell w-100">
        <div class="card login-card border-0 shadow-lg w-100">
          <div class="card-body p-4 p-md-5">
            <div class="brand-stack text-center mb-4">
              <div class="logo-orb mx-auto mb-3">
                <i class="bi bi-cash-coin"></i>
              </div>
              <h1 class="brand-title mb-1">Lendora</h1>
              <p class="brand-subtitle mb-0">Your Trusted Lending Partner</p>
            </div>

            @if (status().success) {
              <div class="alert alert-success" role="alert">{{ status().message }}</div>
            }
            @if (status().error) {
              <div class="alert alert-danger" role="alert">{{ status().error }}</div>
            }

            <form (ngSubmit)="submit()">
              <div class="mb-3">
                <label class="form-label fw-semibold" for="email">Email Address</label>
                <div class="input-group input-shell">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    placeholder="name@company.com"
                    name="email"
                    [(ngModel)]="loginDto.email"
                    required
                    email />
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold" for="password">Password</label>
                <div class="input-group input-shell">
                  <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    placeholder="Enter password"
                    name="password"
                    [(ngModel)]="loginDto.password"
                    required />
                </div>
              </div>

              <button type="submit" class="btn btn-login w-100 py-2" [disabled]="status().loading">
                @if (status().loading) {
                  <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                } @else {
                  <i class="bi bi-box-arrow-in-right me-2"></i>
                }
                Login
              </button>

              <p class="text-center small text-muted mt-3 mb-0">
                New to Lendora?
                <a routerLink="/register" class="text-decoration-none fw-semibold">Register</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </section>
