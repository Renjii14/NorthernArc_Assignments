<div class="toast-stack position-fixed top-0 end-0 p-3" aria-live="polite" aria-atomic="true">
  @for (toast of toastService.messages(); track toast.id) {
    <div class="alert alert-{{ toast.variant }} alert-dismissible fade show shadow-sm mb-2" role="alert">
      {{ toast.message }}
      <button type="button" class="btn-close" aria-label="Close" (click)="dismiss(toast.id)"></button>
    </div>
  }
</div>
