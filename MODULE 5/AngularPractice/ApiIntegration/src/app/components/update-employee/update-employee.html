<section class="container py-4">
	<div class="row justify-content-center">
		<div class="col-12 col-md-8 col-lg-6">
			<div class="card shadow-sm border-0">
				<div class="card-body p-4">
					<h2 class="card-title h4 mb-4 text-warning">Update Employee</h2>

					<form (ngSubmit)="onSubmit()" #updateForm="ngForm" novalidate>
						<div class="mb-3">
							<label for="updateEmpId" class="form-label">Employee Id</label>
							<input
								id="updateEmpId"
								type="number"
								name="id"
								[(ngModel)]="employee.id"
								placeholder="Enter employee id"
								min="1"
								required
								class="form-control"
							/>
						</div>

						<div class="mb-3">
							<label for="updateEmpName" class="form-label">Employee Name</label>
							<input
								id="updateEmpName"
								type="text"
								name="name"
								[(ngModel)]="employee.name"
								placeholder="Enter updated employee name"
								required
								class="form-control"
							/>
						</div>

						<div class="mb-4">
							<label for="updateEmpSalary" class="form-label">Salary</label>
							<input
								id="updateEmpSalary"
								type="number"
								name="salary"
								[(ngModel)]="employee.salary"
								placeholder="Enter updated salary"
								min="0"
								required
								class="form-control"
							/>
						</div>

						<div class="d-flex gap-2">
							<button type="submit" class="btn btn-warning" [disabled]="status().loading || updateForm.invalid">
								Update Employee
							</button>
							<button
								type="button"
								class="btn btn-outline-secondary"
								(click)="onReset(); updateForm.resetForm({ id: 0, name: '', salary: 0 })"
							>
								Reset
							</button>
						</div>
					</form>

					@if (status().loading) {
						<div class="alert alert-info mt-3 mb-0" role="alert">Updating employee...</div>
					}

					@if (status().error) {
						<div class="alert alert-danger mt-3 mb-0" role="alert">{{ status().error }}</div>
					}

					@if (status().success) {
						<div class="alert alert-success mt-3 mb-0" role="alert">Employee updated successfully.</div>
					}
				</div>
			</div>
		</div>
	</div>
</section>
