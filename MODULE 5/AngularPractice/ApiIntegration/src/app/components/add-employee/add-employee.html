<section class="container py-4">
	<div class="row justify-content-center">
		<div class="col-12 col-md-8 col-lg-6">
			<div class="card shadow-sm border-0">
				<div class="card-body p-4">
					<h2 class="card-title h4 mb-4 text-primary">Add Employee</h2>

					<form (ngSubmit)="onSubmit()" #employeeForm="ngForm" class="needs-validation" novalidate>
						<div class="mb-3">
							<label for="empId" class="form-label">Employee Id</label>
							<input
								id="empId"
								type="number"
								name="id"
								[(ngModel)]="employee.id"
								placeholder="Enter employee id"
								min="1"
								required
								class="form-control"
							/>
						</div>

						<div class="mb-3">
							<label for="empName" class="form-label">Employee Name</label>
							<input
								id="empName"
								type="text"
								name="name"
								[(ngModel)]="employee.name"
								placeholder="Enter employee name"
								required
								class="form-control"
							/>
						</div>

						<div class="mb-4">
							<label for="empSalary" class="form-label">Salary</label>
							<input
								id="empSalary"
								type="number"
								name="salary"
								[(ngModel)]="employee.salary"
								placeholder="Enter salary"
								min="0"
								required
								class="form-control"
							/>
						</div>

						<div class="d-flex gap-2">
							<button type="submit" class="btn btn-primary" [disabled]="status().loading || employeeForm.invalid">
								Add Employee
							</button>
							<button type="button" class="btn btn-outline-secondary" (click)="onReset(); employeeForm.resetForm({ id: 0, name: '', salary: 0 })">
								Reset
							</button>
						</div>
					</form>

					@if (status().loading) {
						<div class="alert alert-info mt-3 mb-0" role="alert">Adding employee...</div>
					}

					@if (status().error) {
						<div class="alert alert-danger mt-3 mb-0" role="alert">{{ status().error }}</div>
					}

					@if (status().success) {
						<div class="alert alert-success mt-3 mb-0" role="alert">Employee added successfully.</div>
					}
				</div>
			</div>
		</div>
	</div>
</section>
