<div class="container mt-4">

    <h2 class="text-center mb-4">People Management</h2>

    <div class="row">

        <!-- Add Person -->
        <div class="col-lg-6">
            <app-add-person
                (onAdd)="addPerson($event)">
            </app-add-person>
        </div>

        <!-- Update Person -->
        <div class="col-lg-6">
            <app-update-person
                [people]="people"
                (onUpdate)="updatePerson($event)">
            </app-update-person>
        </div>

    </div>

    <hr class="my-4">

    <div class="row">

        @for(person of people; track person.id){

        <div class="col-md-4 mb-3">

            <app-person
                [p]="person"
                (onRemove)="removePerson($event)">
            </app-person>

        </div>

        }

    </div>

</div>
