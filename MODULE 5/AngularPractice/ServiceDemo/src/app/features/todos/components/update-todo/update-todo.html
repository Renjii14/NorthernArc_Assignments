<div class="card shadow-lg border-0">

    <div class="card-header bg-warning">
        <h3 class="mb-0 text-center">
            ✏ Update Todo
        </h3>
    </div>

    <div class="card-body">

        <div class="mb-3">
            <label class="form-label fw-bold">Todo ID</label>

            <input
                type="number"
                class="form-control"
                placeholder="Enter Todo ID"
                [(ngModel)]="updateTodoData.id"
                (blur)="searchTodo()">
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Title</label>

            <input
                type="text"
                class="form-control"
                [(ngModel)]="updateTodoData.title">
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Description</label>

            <textarea
                rows="4"
                class="form-control"
                [(ngModel)]="updateTodoData.description"></textarea>
        </div>

        <div class="mb-3">

            <label class="form-label fw-bold">
                Status
            </label>

            <select
                class="form-select"
                [(ngModel)]="updateTodoData.completed">

                <option [ngValue]="false">
                    Pending
                </option>

                <option [ngValue]="true">
                    Completed
                </option>

            </select>

        </div>

        <button
            class="btn btn-warning w-100"
            (click)="updateTodo()">

            Update Todo

        </button>

    </div>

</div>
