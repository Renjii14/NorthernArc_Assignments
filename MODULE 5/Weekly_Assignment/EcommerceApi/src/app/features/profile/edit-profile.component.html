<section class="profile-container">
  <header class="profile-header">
    <h1 class="app-page-title">Edit Profile</h1>
    <p>Update your account information.</p>
  </header>

  <div class="edit-profile-grid">
    <article class="edit-profile-card app-surface">
      <div *ngIf="message()" [ngClass]="'alert alert-' + messageType()">
        {{ message() }}
      </div>

      <form (ngSubmit)="onSave()">
        <div class="form-group">
          <label for="name" class="form-label">Full Name</label>
          <input 
            type="text" 
            id="name"
            class="form-control"
            [(ngModel)]="name"
            name="name"
            required>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input 
            type="email" 
            id="email"
            class="form-control"
            [(ngModel)]="email"
            name="email"
            required>
        </div>

        <div class="form-group">
          <label for="customerId" class="form-label">Customer ID</label>
          <input 
            type="text" 
            id="customerId"
            class="form-control"
            [(ngModel)]="customerId"
            name="customerId"
            disabled>
          <small class="form-text text-muted">Customer ID is auto-generated</small>
        </div>

        <div class="form-actions">
          <button 
            type="submit" 
            class="btn btn-primary"
            [disabled]="isLoading()">
            <span *ngIf="!isLoading()"><i class="bi bi-check-lg me-2"></i>Save Changes</span>
            <span *ngIf="isLoading()"><i class="bi bi-hourglass-split me-2"></i>Saving...</span>
          </button>
          <button 
            type="button" 
            class="btn btn-outline-secondary"
            (click)="onCancel()"
            [disabled]="isLoading()">
            <i class="bi bi-x-lg me-2"></i>Cancel
          </button>
        </div>
      </form>
    </article>
  </div>
</section>
