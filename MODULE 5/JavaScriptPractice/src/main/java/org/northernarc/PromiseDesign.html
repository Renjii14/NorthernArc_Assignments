    function mypromise() {
        return new Promise((resolve, reject)=>{
            console.log("Did you finish your homework?");
            setTimeout(() => {
                let answer = Math.round(Math.random());
                if (answer == 1) {
                    resolve();
                } else {
                    reject();
                }
            }, Math.random() * 10 * 1000
            );
            console.log("Exiting!!!");
        });
    }
async function demo() {
        result="Waiting for result!!!"
    result =await mypromise()
        .then(() => {
            return "Yes, I did my homework";
        })
        .catch(() => {
            return "No, I didn't do my homework";
        });
        document.getElementById("main").innerHTML = `<h1>${result}</h1>`;
}
    // result is a promise object. so if i click demo it calls demo function, since its async it calls document line and prints object[promise].....
    //so for the function to wait until the resolve or reject is executed we need to make the function await by putting it inside a async function..
</script>
