<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloning</title>
</head>
<body>
<script>
    var arr=[1,2,3,4];
    var arr2=[...arr];//cloning
    arr2[0]=100;
    alert(arr);
    alert(arr2);
    var arr3=[...arr,1000];//cloning and adding done
    alert(arr3);
</script>
</body>
</html>
