<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpreadOperation</title>
</head>
<body>
<script>
    function sayhi(name1,name2,name3){
        alert("Hi "+name1+" "+name2+" "+name3);
    }
    var arr=["Sachin","Tendulkar","Master Blaster"];
    sayhi(arr[0],arr[1],arr[2]);
    sayhi(...arr);//spread operation.... also used for cloning an array or object.
    var arr2=["a","b"];
    sayhi("Sachin",...arr2)
</script>
</body>
</html>
