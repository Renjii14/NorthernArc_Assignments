<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anna University - CEG</title>
    <style>
        html,body{
            margin:0;
            padding:0;
            height:100%;
            scroll-behavior: smooth;
        }
        *{
            box-sizing: border-box;
        }
        .page-effects{
            position: fixed;
            left:0;
            top:0;
            width:100%;
            height:100%;
            pointer-events:none;
            overflow:hidden;
            z-index:5;
        }
        .candy{
            position:absolute;
            top:-20px;
            width:9px;
            height:17px;
            border-radius:999px;
            opacity:0;
            animation: candyFall 4.5s linear infinite;
        }
        .candy.c1{left:8%; background:#fb7185; animation-delay:0.2s;}
        .candy.c2{left:18%; background:#38bdf8; animation-delay:0.9s;}
        .candy.c3{left:29%; background:#f59e0b; animation-delay:1.5s;}
        .candy.c4{left:41%; background:#22c55e; animation-delay:2.1s;}
        .candy.c5{left:53%; background:#a78bfa; animation-delay:2.8s;}
        .candy.c6{left:66%; background:#f43f5e; animation-delay:3.2s;}
        .candy.c7{left:78%; background:#06b6d4; animation-delay:3.8s;}
        .candy.c8{left:90%; background:#f97316; animation-delay:1.2s;}
        .knowledge-orb{
            position:absolute;
            bottom:-40px;
            width:14px;
            height:14px;
            border-radius:50%;
            opacity:0;
            box-shadow:0 0 10px rgba(56, 189, 248, 0.45);
            animation: orbRise 9s ease-in infinite;
        }
        .knowledge-orb.o1{left:10%; background:#38bdf8; animation-delay:0s;}
        .knowledge-orb.o2{left:26%; background:#a78bfa; animation-delay:2s;}
        .knowledge-orb.o3{left:42%; background:#34d399; animation-delay:4s;}
        .knowledge-orb.o4{left:58%; background:#f59e0b; animation-delay:1.2s;}
        .knowledge-orb.o5{left:74%; background:#fb7185; animation-delay:3.3s;}
        .knowledge-orb.o6{left:90%; background:#22d3ee; animation-delay:5s;}
        #header{
            height:14%;
            width:100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
        }
        #nav{
            height:78%;
            width:24%;
            float:left;
            padding:16px;
            background-color: #f5f7fa;
            overflow-y: auto;
        }
        #main{
            height:78%;
            width:76%;
            float:left;
            padding:0;
            background-color: #ffffff;
            overflow: hidden;
        }
        #footer{
            height:8%;
            width:100%;
            clear:both;
            background-color: #1f2937;
            color:white;
            padding:8px 16px;
        }
        #logo{
            height:88px;
            width:88px;
            position: absolute;
            left:20px;
            top:50%;
            transform: translateY(-50%);
            background-image:url("download.webp");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        #tagline{
            height:auto;
            width:100%;
            display:block;
            text-align:center;
            background-color: transparent;
        }
        #tagline>span{
            display:inline-block;
            padding-left:0;
            font-size:44px;
            font-weight: bold;
            color:#b30000;
        }
        #nav h2{
            margin-top:0;
        }
        #nav ul{
            list-style: none;
            padding:0;
            margin:0;
        }
        #nav li{
            margin-bottom:10px;
        }
        #nav a{
            display:block;
            text-decoration:none;
            color:#0d3f75;
            font-weight:600;
            padding:10px 12px;
            border-radius:6px;
            background-color:#e8f0fe;
        }
        #nav a:hover{
            background-color:#d2e3fc;
        }
        #content-frame{
            width:100%;
            height:100%;
            border:none;
        }
        #footer p{
            margin:0;
            line-height:1.3;
            font-size:14px;
            text-align:center;
        }
        @keyframes candyFall{
            0%{
                transform:translate(0,0) rotate(0deg);
                opacity:0;
            }
            10%{opacity:0.95;}
            85%{opacity:0.95;}
            100%{
                transform:translate(24px,105vh) rotate(260deg);
                opacity:0;
            }
        }
        @keyframes orbRise{
            0%{
                transform: translate(0, 0) scale(0.7);
                opacity:0;
            }
            15%{opacity:0.7;}
            70%{
                transform: translate(-16px, -60vh) scale(1.05);
                opacity:0.8;
            }
            100%{
                transform: translate(12px, -105vh) scale(0.6);
                opacity:0;
            }
        }
    </style>
</head>
<body>
<div class="page-effects">
    <span class="candy c1"></span>
    <span class="candy c2"></span>
    <span class="candy c3"></span>
    <span class="candy c4"></span>
    <span class="candy c5"></span>
    <span class="candy c6"></span>
    <span class="candy c7"></span>
    <span class="candy c8"></span>
    <span class="knowledge-orb o1"></span>
    <span class="knowledge-orb o2"></span>
    <span class="knowledge-orb o3"></span>
    <span class="knowledge-orb o4"></span>
    <span class="knowledge-orb o5"></span>
    <span class="knowledge-orb o6"></span>
</div>
<div id="header">
    <div id="logo"></div>
    <div id="tagline"><span>ANNA UNIVERSITY - CEG</span></div>
</div>
<div id="nav">
    <h2>Campus Quick Links</h2>
    <ul>
        <li><a href="home.html" target="contentFrame">Home</a></li>
        <li><a href="about.html" target="contentFrame">About CEG</a></li>
        <li><a href="departments.html" target="contentFrame">Departments</a></li>
        <li><a href="admissions.html" target="contentFrame">Admissions</a></li>
        <li><a href="placements.html" target="contentFrame">Placements</a></li>
        <li><a href="contact.html" target="contentFrame">Contact</a></li>
    </ul>
</div>
<div id="main">
    <iframe id="content-frame" name="contentFrame" src="home.html" title="College Content"></iframe>
</div>
<div id="footer">
    <p>
        Anna University - College of Engineering, Guindy (CEG), Sardar Patel Road, Guindy, Chennai - 600025 |
        Phone: 044-2235 8491 | Email: info@annauniv.edu
    </p>
</div>
</body>
</html>
