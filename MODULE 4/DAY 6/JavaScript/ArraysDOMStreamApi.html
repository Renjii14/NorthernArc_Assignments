<!DOCTYPE html>
<html>
<head>
  <title>Stream Example</title>
</head>
<body>

<button onclick="demo()">Show List</button>

<div id="content"></div>

<script>
  function demo() {
    var names = ["Lav", "Yuva", "Vishnu", "Harsh"];

    var content = "<ul>" +
            names
                    .sort()
                    .map(function(name) {
                      return "<li>Hello " + name.toUpperCase() + ", Study Well</li>";
                    })
                    .join("")
            + "</ul>";

    document.getElementById("content").innerHTML = content;
  }
</script>

</body>
</html>
