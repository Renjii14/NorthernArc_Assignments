<script>
    // Variables
    let name = "Renjitha";
    let age = 21;

    console.log(name);
    console.log(age);

    // if-else
    if(age >= 18)
    {
        console.log("Adult");
    }
    else
    {
        console.log("Minor");
    }

    // switch
    let grade = "A";

    switch(grade)
    {
        case "A":
            console.log("Excellent");
            break;

        case "B":
            console.log("Very Good");
            break;

        default:
            console.log("Good");
    }

    // for loop
    for(let i=1; i<=5; i++)
    {
        console.log(i);
    }

    // while loop
    let x = 1;

    while(x<=3)
    {
        console.log("While:", x);
        x++;
    }

    // do while
    let y = 1;

    do
    {
        console.log("Do While:", y);
        y++;
    }
    while(y<=3);

    // function
    function add(a,b)
    {
        return a+b;
    }

    console.log(add(10,20));
</script>
</html>
